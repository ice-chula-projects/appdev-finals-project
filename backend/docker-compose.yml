version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT}:${PORT}"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - PORT=${PORT}
    depends_on:
      - mongodb
    volumes:
      - ./settings.json:/app/settings.json:ro
    #allows docker to automatically update the image during developmnt
    develop:
      watch:
        - path: /app/
          target: /app/
          action: sync

  mongodb:
    image: mongo:latest
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: